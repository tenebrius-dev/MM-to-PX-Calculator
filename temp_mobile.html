<!DOCTYPE html><html lang="ru"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ММ → PX Calculator (Mobile)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "error": "#ba1a1a",
                      "surface-container-high": "#e8e8e8",
                      "surface-container": "#eeeeee",
                      "surface": "#f9f9f9",
                      "outline-variant": "#c4c7c7",
                      "on-background": "#1a1c1c",
                      "tertiary": "#000000",

                      "secondary-fixed": "#dde1ff",
                      "surface-variant": "#e2e2e2",

<style>
        body {
            background-color: #F9F9F9;
            min-height: 100dvh;
        }
        .crop-marks { position: relative; }
        .crop-marks::before, .crop-marks::after {
            content: '';
            position: absolute;
            background-color: #000;
        }
        .crop-tl::before { top: -4px; left: 0; width: 8px; height: 1px; }
        .crop-tl::after { top: 0; left: -4px; width: 1px; height: 8px; }
        .crop-br::before { bottom: -4px; right: 0; width: 8px; height: 1px; }
        .crop-br::after { bottom: 0; right: -4px; width: 1px; height: 8px; }
    </style>

<body class="text-on-surface antialiased max-w-[390px] mx-auto flex flex-col relative border-x border-outline-variant/30 bg-background overflow-x-hidden">
<!-- TopNavBar -->
<header class="bg-surface top-0 border-b border-outline-variant flex justify-between items-center w-full px-md py-md z-50 sticky">
<div class="text-[32px] font-bold text-primary flex items-center gap-xs tracking-tight">
<span>ММ</span>
<span class="material-symbols-outlined text-[20px] font-[200]">arrow_forward</span>
<span>PX</span>
</div>
<nav>
<a class="text-on-surface-variant text-[14px] font-medium hover:text-secondary transition-colors" href="#">Инфо</a>
</nav>
</header>
<main class="flex-1 flex flex-col p-md gap-md">
<!-- 1. Hierarchy: Size presets -->
<section class="flex flex-col gap-sm">
<div class="flex items-center gap-sm">
<h2 class="text-[10px] font-medium uppercase tracking-widest text-on-surface-variant whitespace-nowrap">Размер (мм)</h2>
<div class="h-px bg-outline-variant/50 flex-1"></div>
</div>
<div class="grid grid-cols-4 gap-sm">
<button class="px-xs py-sm rounded bg-surface border border-secondary text-secondary text-[14px] font-bold shadow-sm">A4</button>
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">A3</button>
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">A2</button>
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">A1</button>
</div>
<!-- Orientation buttons -->
<div class="flex bg-surface-container-low p-[2px] rounded border border-outline-variant/50 w-full mt-xs">
<button class="flex-1 px-md py-sm rounded bg-surface shadow-sm text-secondary text-[14px] font-bold">Книжная</button>
<button class="flex-1 px-md py-sm rounded text-on-surface-variant text-[14px]">Альбомная</button>
</div>
<!-- Width/Height Inputs -->
<div class="relative grid grid-cols-2 gap-sm mt-xs">
<div class="flex flex-col relative">
<label class="absolute -top-[9px] left-sm bg-background px-xs text-[10px] text-outline z-10 uppercase tracking-widest font-semibold">Ширина</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded text-[20px] font-bold text-on-surface font-label-mono pl-sm pr-xl py-sm h-[56px] text-right focus:outline-none focus:border-secondary" type="number" value="210">
<span class="absolute right-sm text-outline font-medium text-[12px] font-label-mono border-l border-outline-variant pl-sm ml-xs">мм</span>
</div>
</div>
<div class="flex flex-col relative">
<label class="absolute -top-[9px] left-sm bg-background px-xs text-[10px] text-outline z-10 uppercase tracking-widest font-semibold">Высота</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded text-[20px] font-bold text-on-surface font-label-mono pl-sm pr-xl py-sm h-[56px] text-right focus:outline-none focus:border-secondary" type="number" value="297">
<span class="absolute right-sm text-outline font-medium text-[12px] font-label-mono border-l border-outline-variant pl-sm ml-xs">мм</span>
</div>
</div>
<!-- Lock -->
<div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20 bg-background rounded-full p-[2px]">
<button class="bg-surface border border-outline-variant rounded-full p-[4px] text-on-surface-variant hover:text-primary shadow-sm flex items-center justify-center">
<span class="material-symbols-outlined text-[14px]">link</span>
</button>
</div>
</div>
</section>
<!-- Bleed/Margins -->
<section class="flex flex-col gap-sm">
<div class="flex items-center gap-sm">
<h2 class="text-[10px] font-medium uppercase tracking-widest text-on-surface-variant whitespace-nowrap">Вылеты и поля (мм)</h2>
<div class="h-px bg-outline-variant/50 flex-1"></div>
</div>
<div class="grid grid-cols-2 gap-sm mt-xs">
<div class="flex flex-col relative">
<label class="absolute -top-[9px] left-sm bg-background px-xs text-[10px] text-outline z-10 uppercase tracking-widest font-semibold">Вылеты</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded text-[20px] font-bold text-on-surface font-label-mono pl-sm pr-xl py-sm h-[56px] text-right focus:outline-none focus:border-secondary" type="number" value="2">
<span class="absolute right-sm text-outline font-medium text-[12px] font-label-mono border-l border-outline-variant pl-sm ml-xs">мм</span>
</div>
</div>
<div class="flex flex-col relative">
<label class="absolute -top-[9px] left-sm bg-background px-xs text-[10px] text-outline z-10 uppercase tracking-widest font-semibold">Поля</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded text-[20px] font-bold text-on-surface font-label-mono pl-sm pr-xl py-sm h-[56px] text-right focus:outline-none focus:border-secondary" type="number" value="5">
<span class="absolute right-sm text-outline font-medium text-[12px] font-label-mono border-l border-outline-variant pl-sm ml-xs">мм</span>
</div>
</div>
</div>
</section>
<!-- DPI -->
<section class="flex flex-col gap-sm">
<div class="flex items-center gap-sm">
<h2 class="text-[10px] font-medium uppercase tracking-widest text-on-surface-variant whitespace-nowrap">Разрешение (DPI)</h2>
<div class="h-px bg-outline-variant/50 flex-1"></div>
</div>
<div class="grid grid-cols-4 gap-sm mt-xs">
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">72</button>
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">150</button>
<button class="px-xs py-sm rounded bg-surface border border-secondary text-secondary text-[14px] font-bold">300</button>
<button class="px-xs py-sm rounded bg-surface border border-outline-variant text-on-surface-variant text-[14px]">600</button>
</div>
<div class="flex flex-col relative mt-sm">
<label class="absolute -top-[9px] left-sm bg-background px-xs text-[10px] text-outline z-10 uppercase tracking-widest font-semibold">DPI</label>
<div class="relative flex items-center">
<input class="w-full bg-surface border border-outline-variant rounded text-[20px] font-bold text-on-surface font-label-mono pl-sm pr-xl py-sm h-[56px] text-right focus:outline-none focus:border-secondary" type="number" value="300">
<span class="absolute right-sm text-outline font-medium text-[12px] font-label-mono border-l border-outline-variant pl-sm ml-xs">dpi</span>
</div>
</div>
</section>
<!-- Preview -->
<section class="flex flex-col items-center justify-center py-md bg-surface-container-low border border-outline-variant/30 rounded">
<div class="relative bg-surface border border-outline-variant shadow-sm flex flex-col justify-center items-center overflow-visible" style="width: 140px; aspect-ratio: 210 / 297;">
<!-- Bleed: Red dashed -->
<div class="absolute border border-error/40 border-dashed pointer-events-none" style="inset: -0.95%;"></div>
<!-- Margin: Blue dashed -->
<div class="absolute border border-secondary/30 border-dashed pointer-events-none" style="inset: 1.68% 2.38%;"></div>
<div class="text-center flex flex-col gap-0 z-10 pointer-events-none select-none text-outline/60">
<span class="text-[10px] font-bold">A4</span>
<span class="text-[8px] uppercase tracking-tighter">Книжная</span>
</div>
</div>
</section>
<!-- Results -->
<section class="flex flex-col gap-md">
<div class="bg-surface border border-outline-variant p-md relative shadow-sm text-center">
<div class="crop-marks crop-tl absolute top-0 left-0"></div>
<div class="crop-marks crop-br absolute bottom-0 right-0"></div>
<div class="flex flex-col gap-md w-full py-md">
<div class="flex flex-col gap-xs">
<h3 class="text-[10px] font-medium uppercase tracking-widest text-on-surface-variant">С учетом вылетов (Gross)</h3>
<div class="flex items-baseline gap-xs justify-center"><span class="text-[28px] font-bold text-primary font-label-mono tracking-tighter whitespace-nowrap">2527,6 × 3555,1 <span class="text-[14px] font-medium text-outline font-bold ml-xs">px</span></span></div>
</div>
<div class="h-px bg-outline-variant/30 w-1/2 mx-auto"></div>
<div class="flex flex-col gap-xs">
<h3 class="text-[10px] font-medium uppercase tracking-widest text-on-surface-variant">Чистый размер (Net)</h3>
<div class="flex items-baseline gap-xs justify-center"><span class="text-[20px] font-bold text-primary/70 font-label-mono tracking-tight whitespace-nowrap">2480,3 × 3507,9 <span class="text-[14px] font-medium text-outline font-bold ml-xs">px</span></span></div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-secondary text-on-primary py-md px-md rounded font-bold transition-colors flex justify-center items-center gap-sm shadow-md">
<span class="material-symbols-outlined text-[20px]">content_copy</span>
<span class="text-[16px] font-semibold uppercase tracking-wide">Скопировать размер</span>
</button>
</section>
</main>
<!-- Footer -->
<footer class="bg-surface border-t border-outline-variant flex flex-col items-center w-full px-md py-lg mt-xl"><div class="flex justify-between w-full mb-md">
<span class="text-[12px] font-bold text-primary tracking-tight">ММ → PX</span>
<div class="flex gap-md">
<a class="text-[12px] font-medium text-on-surface-variant hover:text-secondary transition-colors" href="#">Справка</a>
<a class="text-[12px] font-medium text-on-surface-variant hover:text-secondary transition-colors" href="#">GitHub</a>
</div>
</div>
<p class="text-[12px] text-on-surface-variant/80 w-full text-left">© 2024 ММ → PX. Точность швейцарского дизайна.</p></footer>
</body></html>
